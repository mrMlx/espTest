<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluetooth Curtains Dual</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 15px; margin: 20px auto; max-width: 350px; border: 1px solid #333; }
        .btn { display: inline-block; width: 30%; margin: 5px; padding: 15px 5px; font-size: 14px; font-weight: bold; color: white; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase;}
        .open { background: #4CAF50; } .close { background: #2196F3; } .stop { background: #f44336; }
        .connect-btn { background: #ff9800; padding: 20px; width: 100%; max-width: 300px; font-size: 18px; }
        .slider { width: 90%; height: 40px; cursor: pointer; margin-top: 10px; }
        #status { font-weight: bold; margin-bottom: 20px; color: #bbb; }
        .hidden { display: none; }
        h3 { margin: 10px 0; font-size: 16px; color: #4CAF50; }
    </style>
</head>
<body>
    <h2>Web Curtains Control</h2>
    <div id="status">Статус: Отключено</div>
    <button class="btn connect-btn" id="connectBtn">ПОДКЛЮЧИТЬ УСТРОЙСТВО</button>

    <div id="controls" class="hidden">
        <div class="card">
            <h3>ЛЕВАЯ ШТОРА (1)</h3>
            <button class="btn open" onclick="sendCmd('f1')">ОТКР</button>
            <button class="btn close" onclick="sendCmd('b1')">ЗАКР</button>
            <button class="btn stop" onclick="sendCmd('s1')">СТОП</button>
            <p>Скорость: <span id="val1">150</span></p>
            <input type="range" min="0" max="255" value="150" class="slider" oninput="sendSpeed('1', this.value)">
        </div>

        <div class="card">
            <h3>ПРАВАЯ ШТОРА (2)</h3>
            <button class="btn open" onclick="sendCmd('f2')">ОТКР</button>
            <button class="btn close" onclick="sendCmd('b2')">ЗАКР</button>
            <button class="btn stop" onclick="sendCmd('s2')">СТОП</button>
            <p>Скорость: <span id="val2">150</span></p>
            <input type="range" min="0" max="255" value="150" class="slider" oninput="sendSpeed('2', this.value)">
        </div>
    </div>

    <script>
        const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
        const CMD_CHAR_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
        const SPD_A_CHAR_UUID = 'd070b4f8-1e43-43f6-953b-e0ac7154fb0e';
        const SPD_B_CHAR_UUID = 'e185c5f9-2d54-54f7-464c-f9bd82650c1f';

        let cmdChar = null;
        let spdAChar = null;
        let spdBChar = null;
        let lastTime = 0;

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                const statusEl = document.getElementById('status');
                statusEl.innerHTML = 'Поиск...';
                
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Web Curtains Dual' }],
                    optionalServices: [SERVICE_UUID]
                });

                statusEl.innerHTML = 'Подключение...';
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                
                cmdChar = await service.getCharacteristic(CMD_CHAR_UUID);
                spdAChar = await service.getCharacteristic(SPD_A_CHAR_UUID);
                spdBChar = await service.getCharacteristic(SPD_B_CHAR_UUID);

                statusEl.innerHTML = 'Статус: Подключено! <span style="color:#4CAF50">●</span>';
                document.getElementById('connectBtn').classList.add('hidden');
                document.getElementById('controls').classList.remove('hidden');

            } catch (error) {
                console.error(error);
                document.getElementById('status').innerHTML = 'Ошибка: ' + error.message;
            }
        });

        async function sendCmd(cmd) {
            if (cmdChar) {
                try {
                    await cmdChar.writeValue(new TextEncoder().encode(cmd));
                } catch (e) { console.log(e); }
            }
        }

        async function sendSpeed(motor, val) {
            document.getElementById('val' + motor).innerHTML = val;
            let now = Date.now();
            if (now - lastTime > 100) {
                try {
                    const char = (motor === '1') ? spdAChar : spdBChar;
                    if (char) {
                        await char.writeValue(new TextEncoder().encode(val.toString()));
                        lastTime = now;
                    }
                } catch (e) { console.log(e); }
            }
        }
    </script>
</body>
</html>
