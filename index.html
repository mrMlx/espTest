<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Шторы Control</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; }
        .motor-card { background: #1e1e1e; padding: 20px; border-radius: 15px; margin: 15px; border: 1px solid #333; }
        button { padding: 15px 20px; font-size: 16px; margin: 5px; border-radius: 8px; border: none; font-weight: bold; }
        .fwd { background: #4CAF50; color: white; }
        .rev { background: #2196F3; color: white; }
        .stop { background: #f44336; color: white; }
        input[type=range] { width: 90%; height: 25px; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Управление шторами</h2>
    <button id="connect" style="background: #ff9800; padding: 20px;">ПОДКЛЮЧИТЬ BLE</button>
    
    <div id="ui" style="display:none;">
        <div class="motor-card">
            <h3>Левая штора (A)</h3>
            <button class="fwd" onclick="cmd('Af')">ОТКРЫТЬ</button>
            <button class="rev" onclick="cmd('Ab')">ЗАКРЫТЬ</button>
            <button class="stop" onclick="cmd('As')">СТОП</button>
            <input type="range" min="0" max="255" value="150" onchange="spd('A', this.value)">
        </div>

        <div class="motor-card">
            <h3>Правая штора (B)</h3>
            <button class="fwd" onclick="cmd('Bf')">ОТКРЫТЬ</button>
            <button class="rev" onclick="cmd('Bb')">ЗАКРЫТЬ</button>
            <button class="stop" onclick="cmd('Bs')">СТОП</button>
            <input type="range" min="0" max="255" value="150" onchange="spd('B', this.value)">
        </div>
    </div>

<script>
let cC, sA, sB;
const S_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";

document.getElementById('connect').onclick = async () => {
    const dev = await navigator.bluetooth.requestDevice({
        filters: [{name: 'Motor Control Dual'}],
        optionalServices: [S_UUID]
    });
    const server = await dev.gatt.connect();
    const service = await server.getPrimaryService(S_UUID);
    cC = await service.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a8");
    sA = await service.getCharacteristic("d074b4f8-1c43-43f6-353b-e8ac7154fb0e");
    sB = await service.getCharacteristic("e185c5f9-2d54-54f7-464c-f9bd82650c1f");
    document.getElementById('ui').style.display = 'block';
    document.getElementById('connect').style.display = 'none';
};

async function cmd(v) { if(cC) await cC.writeValue(new TextEncoder().encode(v)); }
async function spd(m, v) { 
    let char = (m === 'A') ? sA : sB;
    if(char) await char.writeValue(new TextEncoder().encode(v)); 
}
</script>
</body>
</html>
