<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluetooth Шторы</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .btn { display: block; width: 100%; max-width: 300px; margin: 15px auto; padding: 25px; font-size: 24px; font-weight: bold; color: white; border: none; border-radius: 15px; text-decoration: none; cursor: pointer;}
        .open { background: #4CAF50; } .close { background: #2196F3; } .stop { background: #f44336; }
        .slider-container { background: white; padding: 20px; border-radius: 15px; max-width: 300px; margin: 20px auto; }
        .slider { width: 100%; height: 50px; cursor: pointer; }
        #status { font-weight: bold; margin-bottom: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h2>Web Bluetooth Шторы</h2>
    <div id="status">Статус: Отключено</div>
    <button class="btn open" id="connectBtn">ПОДКЛЮЧИТЬ</button>

    <div id="controls" class="hidden">
        <button class="btn open" onclick="sendCmd('f')">ОТКРЫТЬ</button>
        <button class="btn close" onclick="sendCmd('b')">ЗАКРЫТЬ</button>
        <button class="btn stop" onclick="sendCmd('s')">СТОП</button>

        <div class="slider-container">
            <h3>Скорость: <span id="val">150</span></h3>
            <input type="range" min="0" max="255" value="150" class="slider" oninput="sendSpeed(this.value)">
        </div>
    </div>

    <script>
        // UUID должны точно совпадать с кодом ESP32!
        const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
        const CMD_CHAR_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
        const SPD_CHAR_UUID = 'd070b4f8-1e43-43f6-953b-e0ac7154fb0e';

        let curtainDevice = null;
        let cmdCharacteristic = null;
        let spdCharacteristic = null;
        let lastTime = 0; // Для троттлинга скорости

        // Функция подключения
        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                // Ищем устройство с нашим сервисом
                curtainDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });

                document.getElementById('status').innerHTML = 'Статус: Подключение...';
                
                // Подключаемся к GATT серверу
                const server = await curtainDevice.gatt.connect();
                // Получаем сервис
                const service = await server.getPrimaryService(SERVICE_UUID);
                // Получаем обе характеристики
                cmdCharacteristic = await service.getCharacteristic(CMD_CHAR_UUID);
                spdCharacteristic = await service.getCharacteristic(SPD_CHAR_UUID);

                document.getElementById('status').innerHTML = 'Статус: Подключено! <span style="color:green">●</span>';
                document.getElementById('status').style.color = 'green';
                document.getElementById('connectBtn').classList.add('hidden');
                document.getElementById('controls').classList.remove('hidden');

            } catch (error) {
                console.log('Ошибка подключения: ' + error);
                document.getElementById('status').innerHTML = 'Статус: Ошибка!';
                document.getElementById('status').style.color = 'red';
            }
        });

        // Отправка команды кнопок (Forward, Backward, Stop)
        async function sendCmd(cmd) {
            if (cmdCharacteristic) {
                // Web Bluetooth требует отправлять DataView или Uint8Array
                const encoder = new TextEncoder();
                const data = encoder.encode(cmd);
                await cmdCharacteristic.writeValue(data);
                console.log('Отправлена кнопка: ' + cmd);
            }
        }

        // Отправка скорости (ползунок) с троттлингом 80мс
        async function sendSpeed(val) {
            document.getElementById('val').innerHTML = val;
            let now = Date.now();
            if (now - lastTime > 80 && spdCharacteristic) {
                // Преобразуем число ползунка в строку и отправляем
                const encoder = new TextEncoder();
                const data = encoder.encode(val.toString());
                await spdCharacteristic.writeValue(data);
                lastTime = now;
                console.log('Отправлена скорость: ' + val);
            }
        }
    </script>
</body>
</html>
